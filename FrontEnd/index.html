<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Administración de Apuestas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <h1 class="app-title">Sistema de Apuestas</h1>
            <span class="app-badge">Panel de Administración</span>
        </div>
    </header>

    <div id="notification-container" class="notification-container"></div>

    <main class="main-content">
        <section class="section-header">
            <div>
                <h2 class="section-title">Listado Global de Apuestas</h2>
                <p class="section-subtitle">Gestión de estados y apuestas destacadas en tiempo real.</p>
            </div>
            <button id="btn-refresh" class="btn btn-secondary">
                <svg class="icon" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                Refrescar Lista
            </button>
        </section>

        <div id="loading-indicator" class="loading-indicator hidden">
            <div class="spinner"></div>
            <p>Cargando apuestas desde el servidor...</p>
        </div>

        <div id="apuestas-grid" class="apuestas-grid">
            </div>
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 Plataforma de Apuestas - Panel Corporativo Interno.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
