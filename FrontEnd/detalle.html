<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Apuesta</title>

    <link rel="stylesheet" href="detalle.css">
</head>

<body>

    <!-- ========================================== -->
    <!-- HEADER -->
    <!-- ========================================== -->

    <header class="header">

        <h1 class="header__titulo">
            Detalle de la Apuesta
        </h1>

    </header>

    <!-- ========================================== -->
    <!-- CONTENIDO -->
    <!-- ========================================== -->

    <main class="contenido">

        <!-- Card principal -->
        <section
            id="detalleApuesta"
            class="detalle">

        </section>

        <!-- Lista de apostadores -->
        <section class="apostadores">

            <h2 class="apostadores__titulo">
                Personas que apostaron
            </h2>

            <table class="tabla">

                <thead>

                    <tr>
                        <th>Persona</th>
                        <th>Opción</th>
                        <th>Importe</th>
                    </tr>

                </thead>

                <tbody id="tablaApostadores">

                </tbody>

            </table>

        </section>

    </main>

    <!-- ========================================== -->
    <!-- FOOTER -->
    <!-- ========================================== -->

    <footer class="footer">

        <p class="footer__texto">
            Sistema de Apuestas
        </p>

    </footer>

    <script src="detalle.js"></script>

</body>

</html>
